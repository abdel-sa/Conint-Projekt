# The "active" upstream is swapped by switch-blue-green.sh (it rewrites this
# file's include and reloads nginx) - that IS the traffic switch.
include /etc/nginx/conf.d/active-color.conf;

server {
  listen 80;
  location /api/ { proxy_pass http://active_backend/; }
  location / { proxy_pass http://active_frontend/; }
}

server {
  # Always points at green, so the E2E/performance stage can test the new
  # version before it receives real traffic.
  listen 8081;
  location /api/ { proxy_pass http://backend-green:3000/; }
  location / { proxy_pass http://frontend-green:80/; }
}
