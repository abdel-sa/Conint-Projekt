# Runs on the AWS EC2 host. Two colors of each service run side by side;
# router.conf decides which color receives real user traffic.
services:
  backend-blue:
    image: ${DOCKERHUB_USERNAME}/secret-notes-backend:${BLUE_TAG:-latest}
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    expose:
      - "3000"

  backend-green:
    image: ${DOCKERHUB_USERNAME}/secret-notes-backend:${GREEN_TAG:-latest}
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    expose:
      - "3000"

  frontend-blue:
    image: ${DOCKERHUB_USERNAME}/secret-notes-frontend:${BLUE_TAG:-latest}
    expose:
      - "80"

  frontend-green:
    image: ${DOCKERHUB_USERNAME}/secret-notes-frontend:${GREEN_TAG:-latest}
    expose:
      - "80"
  router:
    image: nginx:1.27-alpine
    volumes:
      - ./router.conf:/etc/nginx/conf.d/default.conf:ro
      - ./active-color.conf:/etc/nginx/active-color.conf:ro
    ports:
      - "80:80"
      - "8081:8081" # staging (green) preview port, used by the E2E stage
    depends_on:
      - backend-blue
      - backend-green
      - frontend-blue
      - frontend-green
