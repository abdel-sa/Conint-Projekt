name: Backend CI/CD

on:
  push:
    branches: [main, deploy/production]
    paths: ["backend/**", "deploy/**", ".github/workflows/backend.yml"]

defaults:
  run:
    working-directory: backend

env:
  IMAGE_NAME: secret-notes-backend

jobs:
  lint:
    name: Lint (SonarQube + Snyk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: backend
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY_BACKEND }}
            -Dsonar.sources=src
      - name: Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=backend/package.json --package-manager=npm


  test:
    name: Unit Tests (Jest)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage

  build:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t $IMAGE_NAME:${{ github.sha }} .

  deliver:
    name: Deliver (Push to Docker Hub)
    needs: build
    if: github.ref == 'refs/heads/deploy/production'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to Staging (Green)
    needs: deliver
    if: github.ref == 'refs/heads/deploy/production'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy green environment via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          script: |
            IMAGE_TAG=${{ github.sha }} bash /opt/secret-notes/deploy/deploy-green.sh backend

  e2e-performance:
    name: E2E & Performance Tests + Blue/Green Switch
    needs: deploy
    if: github.ref == 'refs/heads/deploy/production'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run Playwright API tests against green backend
        run: |
          npm ci
          npx playwright install --with-deps
          BASE_URL=${{ secrets.STAGING_GREEN_URL }} npx playwright test
      - name: Run k6 performance tests against green backend
        uses: grafana/k6-action@v0.3.1
        with:
          filename: backend/perf/notes.k6.js
        env:
          BASE_URL: ${{ secrets.STAGING_GREEN_URL }}
      - name: Switch Blue/Green traffic
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          script: bash /opt/secret-notes/deploy/switch-blue-green.sh backend

  notify-failure:
    name: Notify on Failure
    needs: [lint, test, build, deliver, deploy, e2e-performance]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {"text": "Backend pipeline failed on ${{ github.ref_name }} (commit ${{ github.sha }}). See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
