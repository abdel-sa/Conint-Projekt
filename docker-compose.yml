services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: secretnotes
      POSTGRES_PASSWORD: secretnotes
      POSTGRES_DB: secretnotes
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./backend/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secretnotes"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      PORT: 3000
      DATABASE_URL: postgres://secretnotes:secretnotes@db:5432/secretnotes
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000/api
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db-data:
